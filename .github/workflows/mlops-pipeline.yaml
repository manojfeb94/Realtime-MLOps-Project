name: MLOps Pipeline

on:
  push:
    branches: ["*"]
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  GCS_BUCKET: churn-model-bucket-manoj

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install "dvc[gs]"  # Installs DVC with Google Cloud Storage support

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/165993017700/locations/global/workloadIdentityPools/github-mlops-pool/providers/github-provider' # 👈 Replace with your string
        service_account: 'github-actions-sa@project-722e0926-2abc-479e-97f.iam.gserviceaccount.com' # 👈 Replace with your SA email

    # Setting up the gcloud CLI tool automatically uses the credentials generated above
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    
    - name: Generate dataset and Train model
      run: |
            python generate_data.py
            python train.py
    
    - name: Track CSV dataset and PKL model with DVC
      run: |
        dvc add data/churn_data.csv
        dvc add models/churn_model.pkl
    

    
    - name: Push dataset and model to GCS via DVC
      run: |
        dvc remote add -d gcs-remote gs://${{ env.GCS_BUCKET }}/dvc-store --force
        dvc push
        gcloud storage cp models/churn_model.pkl gs://${{ env.GCS_BUCKET }}/models/churn_model.pkl
    
    - name: Update inference.yaml with GCS model path
      run: |
        MODEL_URI="gs://churn-model-bucket-manoj/models/churn_model.pkl"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" k8s/inference.yaml
    
    - name: Commit updated .dvc pointer files and inference.yaml to Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.dvc **/*.dvc k8s/inference.yaml .gitignore
        git commit -m "Update model GCS path [skip ci]" || echo "No changes"
        git push || echo "No changes to push"
